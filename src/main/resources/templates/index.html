<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AI TODO App</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>AI TODO App</h1>

        <!-- TODO追加フォーム -->
        <form th:action="@{/add}" th:object="${newTodo}" method="post" class="todo-form">
            <div class="input-group">
                <input type="text" th:field="*{title}" placeholder="タスクのタイトル..." required>
                <button type="submit" class="add-btn">追加</button>
            </div>
            <textarea th:field="*{description}" placeholder="詳細な内容を入力してください（ここをAIが要約します）" rows="3"></textarea>
        </form>

        <!-- TODO一覧表示 -->
        <ul class="todo-list">
            <li th:each="todo : ${todos}" class="todo-item">
                <form th:action="@{/toggle/{id}(id=${todo.id})}" method="post">
                    <button type="submit"
                            th:classappend="${todo.completed} ? 'completed' : ''"
                            class="btn-action btn-toggle">
                        <span th:text="${todo.completed} ? '✓' : ' '"></span>
                    </button>
                </form>

                <div class="todo-content">
                    <span th:text="${todo.title}"
                          th:classappend="${todo.completed} ? 'completed' : ''"
                          class="todo-text">
                    </span>
                    <div th:if="${todo.description}"
                         th:text="${todo.description}"
                         th:classappend="${todo.completed} ? 'completed' : ''"
                         class="todo-details">
                    </div>
                    <!-- AI要約の表示 -->
                    <div th:if="${todo.summary}"
                         class="todo-summary">
                         ✨ AI要約: <span th:text="${todo.summary}"></span>
                    </div>

                    <!-- サブタスク一覧の表示 -->
                    <ul th:if="${not #lists.isEmpty(todo.subtasks)}" class="subtask-list">
                        <li th:each="subtask : ${todo.subtasks}" class="subtask-item">
                            <form th:action="@{/subtasks/{id}/toggle(id=${subtask.id})}" method="post">
                                <button type="submit"
                                        th:classappend="${subtask.completed} ? 'completed' : ''"
                                        class="subtask-toggle">
                                    <span th:text="${subtask.completed} ? '✓' : ' '"></span>
                                </button>
                            </form>
                            <span th:text="${subtask.content}"
                                  th:classappend="${subtask.completed} ? 'completed' : ''"
                                  class="subtask-text">
                            </span>
                        </li>
                    </ul>
                </div>

                <!-- AIアクションボタン群 -->
                <div class="ai-actions">
                    <!-- AI要約ボタン -->
                    <form th:if="${todo.description and not todo.completed}" th:action="@{/summarize/{id}(id=${todo.id})}" method="post">
                        <button type="submit" class="btn-action btn-ai" title="AIで要約する">🪄 要約</button>
                    </form>
                    
                    <!-- サブタスク生成ボタン -->
                    <form th:if="${not todo.completed}" th:action="@{/todos/{id}/generate-subtasks(id=${todo.id})}" method="post">
                        <button type="submit" class="btn-action btn-ai" title="サブタスクを生成する">📋 分解</button>
                    </form>
                </div>

                <form th:action="@{/delete/{id}(id=${todo.id})}" method="post">
                    <button type="submit" class="btn-action btn-delete">削除</button>
                </form>
            </li>
        </ul>

        <p th:if="${#lists.isEmpty(todos)}" style="text-align: center; color: #888;">
            タスクはありません。新しいタスクを追加しましょう！
        </p>
    </div>
</body>
</html>
