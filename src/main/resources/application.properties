spring.application.name=todo-ai-app

spring.datasource.url=jdbc:h2:mem:todo-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spring AI Google GenAI Configuration
spring.ai.google.genai.api-key=${SPRING_AI_GOOGLE_AI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-1.5-flash
